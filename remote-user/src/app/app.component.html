<div class="py-8 max-w-lg mx-auto">
  <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-8 text-center">User Dashboard</h1>

  <div *ngIf="user; else loginForm" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    
    <!-- Local State Tabs -->
    <div class="flex border-b border-gray-200">
      <button 
        (click)="setTab('profile')"
        [class.border-indigo-500]="activeTab === 'profile'"
        [class.text-indigo-600]="activeTab === 'profile'"
        class="flex-1 py-3 text-sm font-medium text-center border-b-2 border-transparent hover:text-indigo-600 transition-colors"
      >
        My Profile
      </button>
      <button 
        (click)="setTab('favorites')"
        [class.border-indigo-500]="activeTab === 'favorites'"
        [class.text-indigo-600]="activeTab === 'favorites'"
        class="flex-1 py-3 text-sm font-medium text-center border-b-2 border-transparent hover:text-indigo-600 transition-colors flex items-center justify-center gap-2"
      >
        Favorites 
        <span class="bg-indigo-100 text-indigo-600 py-0.5 px-2 rounded-full text-xs">{{ favoriteCount }}</span>
      </button>
    </div>

    <!-- Tab Content -->
    <div class="p-8 text-center">
      <div *ngIf="activeTab === 'profile'">
        <div class="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4">
          👤
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Welcome, {{ user.username }}!</h2>
        <p class="text-gray-500 mb-6">Logged in since: {{ user.loggedInAt | date:'medium' }}</p>
        
        <button (click)="handleLogout()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-medium transition-colors">
          Logout
        </button>
      </div>

      <div *ngIf="activeTab === 'favorites'">
        <div class="text-4xl mb-4">❤️</div>
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Your Wishlist</h2>
        <p class="text-gray-500">You have favorited {{ favoriteCount }} items from the shop.</p>
        <p class="text-sm text-gray-400 mt-2">(Go to the Products page to add more!)</p>
      </div>
    </div>
  </div>

  <ng-template #loginForm>
    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Please login to continue</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input 
            type="text" 
            [(ngModel)]="usernameInput" 
            placeholder="Enter your username"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" 
            (keyup.enter)="handleLogin()"
          />
        </div>
        <button 
          (click)="handleLogin()" 
          [disabled]="!usernameInput"
          class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-400 text-white px-4 py-2 rounded-lg font-semibold transition-colors"
        >
          Login
        </button>
      </div>
    </div>
  </ng-template>
</div>
