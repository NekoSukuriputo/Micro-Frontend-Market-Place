<div class="py-8 max-w-lg mx-auto">
  <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-8 text-center">User Profile</h1>

  <div *ngIf="user; else loginForm" class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 text-center">
    <div class="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4">
      👤
    </div>
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Welcome, {{ user.username }}!</h2>
    <p class="text-gray-500 mb-6">Logged in since: {{ user.loggedInAt | date:'medium' }}</p>
    
    <button (click)="handleLogout()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-medium transition-colors">
      Logout
    </button>
  </div>

  <ng-template #loginForm>
    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Please login to continue</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input 
            type="text" 
            [(ngModel)]="usernameInput" 
            placeholder="Enter your username"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" 
            (keyup.enter)="handleLogin()"
          />
        </div>
        <button 
          (click)="handleLogin()" 
          [disabled]="!usernameInput"
          class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-400 text-white px-4 py-2 rounded-lg font-semibold transition-colors"
        >
          Login
        </button>
      </div>
    </div>
  </ng-template>
</div>
